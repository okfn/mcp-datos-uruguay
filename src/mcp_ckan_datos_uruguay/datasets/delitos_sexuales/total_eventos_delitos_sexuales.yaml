engine: aggregate

# Fuente: Ministerio del Interior - catalogodatos.gub.uy
# Preguntas que esta herramienta puede responder:
# - ¿Cuántos delitos sexuales se registraron en Uruguay?
# - ¿Cuántas denuncias de violación hubo en Montevideo?
# - ¿Cuántos casos de abuso sexual se registraron en Canelones?

dataset:
  name: total-eventos-delitos-sexuales-uruguay
  description: "Total de denuncias de delitos sexuales en Uruguay (2018-2024)"
  source:
    csv: https://catalogodatos.gub.uy/dataset/5f1aebb0-7f52-4fb9-a2f2-e38f498301f2/resource/4de1678e-3faf-4d6e-9e90-eaeae87925a5/download/eventos-de-delitos-sexuales-2018-2024.csv
    url: https://catalogodatos.gub.uy/dataset/delitos-sexuales
    encoding: "latin-1"

tool:
  name: total_eventos_delitos_sexuales_uy
  description: >
    Cantidad total de denuncias de delitos sexuales registradas en Uruguay (2018-2024).
    Puede filtrarse por departamento y tipo de delito.
  column: Departamento
  aggregation: count
  format: "{result:,}"
  filters:
    - column: Departamento
      param: departamento
      description: "Departamento, ej: MONTEVIDEO, CANELONES, MALDONADO"
      label: "en {value}"
    - column: Título
      param: tipo_delito
      description: "Tipo de delito: ABUSO SEXUAL, VIOLACIÓN, ATENTADO VIOLENTO AL PUDOR"
      label: "de tipo {value}"
  response: |
    Se registraron {result} denuncias de delitos sexuales {filter_label} en Uruguay (2018-2024).
    Fuente: Ministerio del Interior, Uruguay - {source}

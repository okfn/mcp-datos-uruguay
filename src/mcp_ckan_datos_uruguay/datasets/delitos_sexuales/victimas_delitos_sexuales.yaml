engine: row_list

# Fuente: Ministerio del Interior - catalogodatos.gub.uy
# Preguntas que esta herramienta puede responder:
# - ¿Qué víctimas de delitos sexuales se registraron en Montevideo?
# - ¿Cuántas víctimas mujeres de violación hubo en 2022?
# - ¿Qué víctimas varones de abuso sexual se registraron en Canelones?

dataset:
  name: victimas-delitos-sexuales-uruguay
  description: "Víctimas de delitos sexuales registradas en Uruguay (2018-2024)"
  source:
    csv: https://catalogodatos.gub.uy/dataset/5f1aebb0-7f52-4fb9-a2f2-e38f498301f2/resource/b5aaa38d-efae-4227-a6b4-e69602c1cacb/download/victimas-de-delitos-sexuales-2018-2024.csv
    url: https://catalogodatos.gub.uy/dataset/delitos-sexuales
    encoding: "latin-1"

tool:
  name: victimas_delitos_sexuales_uy
  description: >
    Lista de víctimas de delitos sexuales registradas en Uruguay (2018-2024).
    Cada registro incluye sexo, año de nacimiento, fecha del hecho, tipo de delito y departamento.
    Puede filtrarse por departamento, tipo de delito y sexo.
  columns:
    - column: Sexo
      label: "Sexo"
    - column: Fecha de nacimiento
      label: "Nacimiento"
    - column: Fecha de ingreso
      label: "Fecha"
    - column: Titulo
      label: "Delito"
    - column: Departamento
      label: "Departamento"
  filters:
    - column: Departamento
      param: departamento
      description: "Departamento, ej: MONTEVIDEO, CANELONES, MALDONADO"
      label: "en {value}"
    - column: Titulo
      param: tipo_delito
      description: "Tipo de delito: ABUSO SEXUAL, VIOLACIÓN, ATENTADO VIOLENTO AL PUDOR"
      label: "de tipo {value}"
    - column: Sexo
      param: sexo
      description: "Sexo de la víctima: MUJER, VARÓN"
      label: "sexo {value}"
  limit: 40
  sort:
    column: Fecha de ingreso
    order: desc
  response: |
    Se encontraron {count} víctimas de delitos sexuales {filter_label}:
    {list}
    Fuente: Ministerio del Interior, Uruguay - {source}
